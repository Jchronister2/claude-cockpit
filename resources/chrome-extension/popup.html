<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #cdd6f4;
      background: #1e1e2e;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #89b4fa;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.connected { background: #1e3a2e; color: #a6e3a1; }
    .status.disconnected { background: #45243e; color: #f38ba8; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #b4d0fb; }
    button:disabled { opacity: 0.5; cursor: default; }
    input {
      box-sizing: border-box;
      width: 100%;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      background: #181825;
    }
    #saveBtn { margin-bottom: 8px; background: #a6e3a1; }
    .result {
      margin-top: 8px;
      font-size: 12px;
      color: #a6adc8;
    }
  </style>
</head>
<body>
  <h3>Cockpit Cookie Bridge</h3>
  <div id="status" class="status disconnected">Checking...</div>
  <input id="token" type="password" autocomplete="off" placeholder="Bridge token" />
  <button id="saveBtn">Save Token</button>
  <button id="syncBtn" disabled>Sync Now</button>
  <div id="result" class="result"></div>
  <script src="popup.js"></script>
</body>
</html>
